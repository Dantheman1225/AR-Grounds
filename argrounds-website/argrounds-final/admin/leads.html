<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leads | Grounds Maintenance Admin</title>
  <meta name="robots" content="noindex, nofollow" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/admin.css" />

  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
</head>
<body>
  <div class="admin-wrap">
    <aside class="admin-sidebar" id="adminSidebar">
      <div class="sidebar-logo">
      <img src="../assets/brand/logo.svg" alt="Grounds Maintenance" style="height: 36px; display: block; margin: 0 auto;" />
    </div>
      <nav class="sidebar-nav">
        <div class="sidebar-nav-section">Main</div>
        <a href="dashboard.html" class="sidebar-link"><span class="sidebar-link-icon">&#9632;</span> Dashboard</a>
        <a href="leads.html" class="sidebar-link is-active"><span class="sidebar-link-icon">&#128101;</span> Leads <span class="sidebar-link-badge" id="newLeadCount">0</span></a>
        <a href="customers.html" class="sidebar-link"><span class="sidebar-link-icon">&#128100;</span> Customers</a>
        <a href="jobs.html" class="sidebar-link"><span class="sidebar-link-icon">&#128295;</span> Jobs</a>
        <div class="sidebar-nav-section">Assets &amp; Billing</div>
        <a href="photos.html" class="sidebar-link"><span class="sidebar-link-icon">&#128247;</span> Photos</a>
        <a href="payments.html" class="sidebar-link"><span class="sidebar-link-icon">&#128176;</span> Payments</a>
        <div class="sidebar-nav-section">Config</div>
        <a href="settings.html" class="sidebar-link"><span class="sidebar-link-icon">&#9881;</span> Settings</a>
        <a href="../index.html" class="sidebar-link" target="_blank"><span class="sidebar-link-icon">&#127760;</span> View Site</a>
      </nav>
      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="sidebar-user-avatar" id="userInitial">A</div>
          <div><div class="sidebar-user-name" id="userName">Admin</div><div class="sidebar-user-role">Owner</div></div>
          <button class="sidebar-logout" id="logoutBtn">&#8594;</button>
        </div>
      </div>
    </aside>

    <main class="admin-main">
      <div class="admin-topbar">
        <button class="admin-hamburger" id="adminHamburger" aria-label="Open menu">&#9776;</button>
        <div style="display:flex;align-items:center;gap:12px;">
          <a href="dashboard.html" class="admin-btn admin-btn-ghost admin-btn-sm" title="Back to Dashboard">&#8592; Back</a>
          <div class="admin-page-title">Leads</div>
        </div>
        <div class="admin-topbar-actions">
          <select class="admin-table-search" id="statusFilter" style="width:160px">
            <option value="">All Statuses</option>
            <option value="new">New</option>
            <option value="quoted">Quoted</option>
            <option value="booked">Booked</option>
            <option value="done">Done</option>
          </select>
          <button class="admin-btn admin-btn-primary admin-btn-sm" id="newLeadBtn">+ New Lead</button>
        </div>
      </div>

      <div class="admin-content">
        <div class="admin-table-wrap">
          <div class="admin-table-header">
            <div class="admin-table-title">All Leads</div>
            <input type="search" class="admin-table-search" placeholder="Search name, phone, address…" id="leadSearch" />
          </div>
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Phone</th>
                <th>Service</th>
                <th>Address</th>
                <th>Status</th>
                <th>Date</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="leadsBody">
              <tr><td colspan="7">
                <div class="admin-empty">
                  <div class="admin-empty-icon">&#128101;</div>
                  <div class="admin-empty-title">No leads yet</div>
                  <div class="admin-empty-sub">Use + New Lead to add one manually.</div>
                </div>
              </td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
  <script src="../js/auth.js"></script>
  <script src="../js/admin.js"></script>
</body>
</html>
