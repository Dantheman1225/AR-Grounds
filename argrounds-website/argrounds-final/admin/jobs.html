<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jobs | Grounds Maintenance Admin</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/admin.css" />
</head>
<body>
  <div class="admin-wrap">
    <aside class="admin-sidebar">
      <div class="sidebar-logo">
        <svg viewBox="0 0 40 40" fill="none" width="28" height="28" xmlns="http://www.w3.org/2000/svg"><rect width="40" height="40" rx="10" fill="#1a6b3c"/><path d="M10 30 Q20 10 30 30" stroke="#fff" stroke-width="3" stroke-linecap="round" fill="none"/><circle cx="20" cy="14" r="4" fill="#7fe8a2"/></svg>
        <span class="sidebar-logo-text">Grounds</span>
        <span class="sidebar-logo-badge">Admin</span>
      </div>
      <nav class="sidebar-nav">
        <div class="sidebar-nav-section">Main</div>
        <a href="dashboard.html" class="sidebar-link"><span class="sidebar-link-icon">&#9632;</span> Dashboard</a>
        <a href="leads.html" class="sidebar-link"><span class="sidebar-link-icon">&#128101;</span> Leads</a>
        <a href="customers.html" class="sidebar-link"><span class="sidebar-link-icon">&#128100;</span> Customers</a>
        <a href="jobs.html" class="sidebar-link is-active"><span class="sidebar-link-icon">&#128295;</span> Jobs</a>
        <div class="sidebar-nav-section">Assets &amp; Billing</div>
        <a href="photos.html" class="sidebar-link"><span class="sidebar-link-icon">&#128247;</span> Photos</a>
        <a href="payments.html" class="sidebar-link"><span class="sidebar-link-icon">&#128176;</span> Payments</a>
        <div class="sidebar-nav-section">Config</div>
        <a href="settings.html" class="sidebar-link"><span class="sidebar-link-icon">&#9881;</span> Settings</a>
        <a href="../index.html" class="sidebar-link" target="_blank"><span class="sidebar-link-icon">&#127760;</span> View Site</a>
      </nav>
      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="sidebar-user-avatar">A</div>
          <div><div class="sidebar-user-name">Admin</div><div class="sidebar-user-role">Owner</div></div>
          <button class="sidebar-logout" id="logoutBtn">&#8594;</button>
        </div>
      </div>
    </aside>

    <main class="admin-main">
      <div class="admin-topbar">
        <div class="admin-page-title">Jobs</div>
        <div class="admin-topbar-actions">
          <button class="admin-btn admin-btn-primary admin-btn-sm" id="newJobBtn">+ New Job</button>
        </div>
      </div>
      <div class="admin-content">
        <div class="admin-table-wrap">
          <div class="admin-table-header">
            <div class="admin-table-title">All Jobs</div>
            <input type="search" class="admin-table-search" placeholder="Search customer, address…" />
          </div>
          <table>
            <thead>
              <tr>
                <th>Customer</th>
                <th>Service</th>
                <th>Address</th>
                <th>Scheduled</th>
                <th>Price</th>
                <th>Status</th>
                <th>Stripe Link</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="jobsBody">
              <tr>
                <td colspan="8">
                  <div class="admin-empty">
                    <div class="admin-empty-icon">&#128295;</div>
                    <div class="admin-empty-title">No jobs yet</div>
                    <div class="admin-empty-sub">Convert a lead to a job to get started.</div>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
  <script src="../js/auth.js"></script>
  <script src="../js/admin.js"></script>
</body>
</html>
