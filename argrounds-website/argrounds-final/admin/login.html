<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | Grounds Maintenance</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/admin.css" />
</head>
<body class="admin-login-body">

  <div class="admin-login-card">
    <div class="admin-login-logo">
      <svg viewBox="0 0 40 40" fill="none" width="32" height="32" xmlns="http://www.w3.org/2000/svg">
        <rect width="40" height="40" rx="10" fill="#1a6b3c"/>
        <path d="M10 30 Q20 10 30 30" stroke="#fff" stroke-width="3" stroke-linecap="round" fill="none"/>
        <circle cx="20" cy="14" r="4" fill="#7fe8a2"/>
      </svg>
      <span style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.2rem;color:#fff">Grounds</span>
    </div>

    <h1 class="admin-login-title">Admin Login</h1>
    <p class="admin-login-sub">Sign in to manage leads, jobs, and photos.</p>

    <div class="admin-login-error" id="loginError">Invalid email or password. Please try again.</div>

    <form class="admin-form" id="loginForm" novalidate>
      <div class="admin-field">
        <label for="loginEmail">Email Address</label>
        <input type="email" id="loginEmail" name="email" placeholder="you@email.com" required autocomplete="email" />
      </div>
      <div class="admin-field">
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" name="password" placeholder="••••••••••" required autocomplete="current-password" />
      </div>
      <button type="submit" class="admin-btn admin-btn-primary" style="width:100%;justify-content:center;min-height:44px;" id="loginBtn">
        Sign In
      </button>
    </form>

    <p class="admin-login-footer">Forgot your password? Contact your administrator.</p>
  </div>

  <script src="../js/auth.js"></script>
</body>
</html>
