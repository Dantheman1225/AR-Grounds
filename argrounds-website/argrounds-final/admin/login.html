<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | Grounds Maintenance</title>
  <meta name="robots" content="noindex, nofollow" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/admin.css" />

  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
</head>
<body class="admin-login-body">

  <div class="admin-login-card">
    <div class="admin-login-logo">
      <img src="../assets/brand/Icon.svg" alt="" style="height: 32px; width: auto;" aria-hidden="true" />
      <img src="../assets/brand/Header Text.svg" alt="Grounds Maintenance" style="height: 16px; width: auto;" />
    </div>

    <h1 class="admin-login-title">Admin Login</h1>
    <p class="admin-login-sub">Sign in to manage leads, jobs, and photos.</p>

    <div class="admin-login-error" id="loginError">Invalid email or password. Please try again.</div>

    <form class="admin-form" id="loginForm" novalidate>
      <div class="admin-field">
        <label for="loginEmail">Email Address</label>
        <input type="email" id="loginEmail" name="email" placeholder="you@email.com" required autocomplete="email" />
      </div>
      <div class="admin-field">
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" name="password" placeholder="••••••••••" required autocomplete="current-password" />
      </div>
      <button type="submit" class="admin-btn admin-btn-primary" style="width:100%;justify-content:center;min-height:44px;" id="loginBtn">
        Sign In
      </button>
    </form>

    <p class="admin-login-footer">Forgot your password? Contact your administrator.</p>
  </div>

  <script src="../js/auth.js"></script>
</body>
</html>
